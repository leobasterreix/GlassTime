<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a84ff"/>
      <stop offset="0.55" stop-color="#7a5af2"/>
      <stop offset="1" stop-color="#bf5af2"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#5ac8fa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5ac8fa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.9" r="0.7">
      <stop offset="0" stop-color="#ff375f" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff375f" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow1)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow2)"/>

  <!-- Carte de verre -->
  <g>
    <rect x="86" y="126" width="340" height="260" rx="56" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.55" stroke-width="7"/>
    <!-- Reflet supérieur -->
    <path d="M142 126 h228 a56 56 0 0 1 56 56 v14 c-90 34 -250 34 -340 0 v-14 a56 56 0 0 1 56 -56 z" fill="url(#sheen)"/>
  </g>

  <!-- Pied lumineux -->
  <rect x="196" y="404" width="120" height="16" rx="8" fill="#ffffff" opacity="0.65"/>
</svg>
